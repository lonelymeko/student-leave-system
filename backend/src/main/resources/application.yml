server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: leave-backend
  datasource:
    url: jdbc:mysql://localhost:3306/leave_sys?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: leave_app
    password: leave123
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    # 供应商选择：openai | anthropic | auto（auto=优先 OpenAI，无 Key 再回退 Anthropic）
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}   # 任意 OpenAI 兼容网关（DeepSeek/通义/one-api 等）
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          max-tokens: 1024
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-placeholder}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-opus-4-8}
          max-tokens: 1024

app:
  ai:
    provider: ${AI_PROVIDER:auto}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: leave-sys-jwt-secret-key-2026-school-course-design-0707
  expire-hours: 168

logging:
  level:
    com.school.leave: info

wx:
  appid: ${WX_APPID:}
  secret: ${WX_SECRET:}
